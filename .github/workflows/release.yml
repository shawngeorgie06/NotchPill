name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=v${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "label=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build MediaRemote adapter
        run: ./Scripts/setup-vendor.sh

      - name: Import code signing certificate
        timeout-minutes: 5
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_P12:-}" ]]; then
            echo "No signing certificate secret configured; skipping import."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # A self-signed cert must be trusted for code signing before codesign
          # will find it as a valid identity. Trust it in the ADMIN domain via
          # sudo (the runner has passwordless sudo) — the user-domain form prompts
          # interactively and hangs headless CI. For a real Developer ID cert this
          # is a harmless extra anchor since Apple's chain already trusts it.
          openssl pkcs12 -in "$RUNNER_TEMP/certificate.p12" -clcerts -nokeys \
            -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -out "$RUNNER_TEMP/cert.pem" 2>/dev/null || true
          if [[ -s "$RUNNER_TEMP/cert.pem" ]]; then
            sudo -n security add-trusted-cert -d -r trustRoot -p codeSign \
              -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.pem" \
              || echo "warning: could not add trust anchor (continuing)"
          fi
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

      - name: Build NotchPill (Release)
        timeout-minutes: 25
        env:
          NOTCHPILL_SIGN_IDENTITY: ${{ secrets.NOTCHPILL_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ARGS=(
            CODE_SIGNING_ALLOWED=YES
          )
          if [[ -n "${NOTCHPILL_SIGN_IDENTITY:-}" ]]; then
            SIGN_ARGS+=(
              CODE_SIGN_IDENTITY="$NOTCHPILL_SIGN_IDENTITY"
              CODE_SIGN_STYLE=Manual
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
              ENABLE_HARDENED_RUNTIME=YES
              CODE_SIGN_ENTITLEMENTS=NotchPill/NotchPill.entitlements
            )
          else
            SIGN_ARGS+=(
              CODE_SIGN_IDENTITY="-"
              ENABLE_HARDENED_RUNTIME=NO
            )
          fi
          xcodebuild \
            -project NotchPill.xcodeproj \
            -scheme NotchPill \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            "${SIGN_ARGS[@]}" \
            build

      - name: Sign and notarize
        timeout-minutes: 15
        env:
          NOTCHPILL_SIGN_IDENTITY: ${{ secrets.NOTCHPILL_SIGN_IDENTITY }}
          NOTCHPILL_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTCHPILL_NOTARY_KEYCHAIN_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x Scripts/sign-and-notarize.sh
          ./Scripts/sign-and-notarize.sh build/Build/Products/Release/NotchPill.app

      - name: Package ZIP
        run: |
          VERSION="${{ steps.version.outputs.label }}"
          VERSION="${VERSION#v}"
          STAGE="dist/NotchPill-${VERSION}-macOS-arm64"
          mkdir -p "$STAGE"
          cp -R build/Build/Products/Release/NotchPill.app "$STAGE/"
          cp RELEASE_INSTALL.txt "$STAGE/READ ME FIRST.txt"
          cp INSTALL_COMMANDS.txt "$STAGE/INSTALL COMMANDS.txt"
          cp "Scripts/Install NotchPill.command" "$STAGE/Install NotchPill.command"
          chmod +x "$STAGE/Install NotchPill.command"
          mkdir -p dist
          ditto -c -k --keepParent "$STAGE" "dist/NotchPill-${VERSION}-macOS-arm64.zip"
          shasum -a 256 "dist/NotchPill-${VERSION}-macOS-arm64.zip" | tee dist/SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NotchPill ${{ steps.version.outputs.label }}
          body_path: .github/release-install-body.md
          files: |
            dist/NotchPill-*-macOS-arm64.zip
            dist/SHA256SUMS.txt

      # Point the Homebrew cask at the new release so `brew upgrade` picks it up.
      # Needs a repo-scoped PAT for shawngeorgie06/homebrew-tap as secret
      # TAP_PUSH_TOKEN. If the secret is unset the step is skipped (release still
      # succeeds); update the cask by hand or via Scripts/bump-cask.sh.
      - name: Update Homebrew cask
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          RELEASE_LABEL: ${{ steps.version.outputs.label }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_PUSH_TOKEN:-}" ]]; then
            echo "TAP_PUSH_TOKEN not set; skipping cask update (bump it manually with Scripts/bump-cask.sh)."
            exit 0
          fi
          VERSION="${RELEASE_LABEL#v}"
          ZIP="dist/NotchPill-${VERSION}-macOS-arm64.zip"
          SHA="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          git clone --depth 1 "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/shawngeorgie06/homebrew-tap.git" tap
          CASK="tap/Casks/notchpill.rb"
          /usr/bin/sed -i '' -E "s/^  version \"[^\"]*\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \"[^\"]*\"/  sha256 \"${SHA}\"/" "$CASK"
          cd tap
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git -c user.email="actions@github.com" -c user.name="github-actions" \
            commit -am "notchpill ${VERSION}"
          git push origin HEAD:main
