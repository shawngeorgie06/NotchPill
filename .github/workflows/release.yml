name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=v${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "label=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build MediaRemote adapter
        run: ./Scripts/setup-vendor.sh

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_P12:-}" ]]; then
            echo "No signing certificate secret configured; skipping import."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build NotchPill (Release)
        env:
          NOTCHPILL_SIGN_IDENTITY: ${{ secrets.NOTCHPILL_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ARGS=(
            CODE_SIGNING_ALLOWED=YES
          )
          if [[ -n "${NOTCHPILL_SIGN_IDENTITY:-}" ]]; then
            SIGN_ARGS+=(
              CODE_SIGN_IDENTITY="$NOTCHPILL_SIGN_IDENTITY"
              CODE_SIGN_STYLE=Manual
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
              ENABLE_HARDENED_RUNTIME=YES
              CODE_SIGN_ENTITLEMENTS=NotchPill/NotchPill.entitlements
            )
          else
            SIGN_ARGS+=(
              CODE_SIGN_IDENTITY="-"
              ENABLE_HARDENED_RUNTIME=NO
            )
          fi
          xcodebuild \
            -project NotchPill.xcodeproj \
            -scheme NotchPill \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            "${SIGN_ARGS[@]}" \
            build

      - name: Sign and notarize
        env:
          NOTCHPILL_SIGN_IDENTITY: ${{ secrets.NOTCHPILL_SIGN_IDENTITY }}
          NOTCHPILL_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTCHPILL_NOTARY_KEYCHAIN_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x Scripts/sign-and-notarize.sh
          ./Scripts/sign-and-notarize.sh build/Build/Products/Release/NotchPill.app

      - name: Package ZIP
        run: |
          VERSION="${{ steps.version.outputs.label }}"
          VERSION="${VERSION#v}"
          mkdir -p dist
          ditto -c -k --keepParent \
            build/Build/Products/Release/NotchPill.app \
            "dist/NotchPill-${VERSION}-macOS-arm64.zip"
          shasum -a 256 "dist/NotchPill-${VERSION}-macOS-arm64.zip" | tee dist/SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NotchPill ${{ steps.version.outputs.label }}
          generate_release_notes: true
          files: |
            dist/NotchPill-*-macOS-arm64.zip
            dist/SHA256SUMS.txt
